    <!-- PRICE TABLE STYLING START -->
        <style>
            :root {
                --emerald: #2ecc71;
                --dark: #2c3e50;
                --light-gray: #f8f9fa;
                --text-gray: #7f8c8d;
                --white: #ffffff;
                --shadow: 0 4px 15px rgba(0,0,0,0.08);
            }

            .dental-pricing-section {
                font-family: 'Segoe UI', Arial, sans-serif;
                margin: 40px auto;
                color: var(--dark);
            }

            .dental-pricing-section h2 {
                font-size: 24px;
                margin-bottom: 10px;
                color: var(--dark);
            }

            .dental-pricing-section p.subtitle {
                color: var(--text-gray);
                margin-bottom: 30px;
            }

            /* Container for the table */
            .comparison-table {
                width: 100%;
                border-collapse: collapse;
                background: var(--white);
                border-radius: 12px;
                overflow: hidden;
                box-shadow: var(--shadow);
            }

            /* Desktop View */
            .comparison-table thead {
                background-color: var(--dark);
                color: var(--white);
            }

            .comparison-table th {
                padding: 20px 15px;
                text-align: left;
                font-weight: 600;
                text-transform: uppercase;
                font-size: 13px;
                letter-spacing: 0.5px;
            }

            .comparison-table td {
                padding: 18px 15px;
                border-bottom: 1px solid #edf2f7;
                font-size: 15px;
            }

            .service-title {
                font-weight: 700;
                display: block;
                margin-bottom: 4px;
                color: var(--dark);
            }

            .price-albania {
                color: var(--emerald);
                font-weight: 800;
                font-size: 16px;
            }

            .savings-tag {
                display: inline-block;
                background: rgba(46, 204, 113, 0.15);
                color: #27ae60;
                font-size: 11px;
                padding: 2px 8px;
                border-radius: 20px;
                font-weight: 700;
                margin-top: 5px;
            }

            /* MOBILE-FIRST NO-SCROLL LOGIC */
        </style>
